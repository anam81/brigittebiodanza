<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Editor</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>
body{
font-family:Arial;
max-width:800px;
margin:auto;
}

#editor{
height:300px;
}

button{
margin-top:10px;
padding:10px;
}
</style>
</head>

<body>

<h1>Seite bearbeiten</h1>

<div id="editor"></div>

<button id="save">Save</button>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>

const quill = new Quill('#editor',{
theme:'snow',
modules:{
toolbar:[
[{header:[1,2,3,false]}],
['bold','italic','underline'],
[{color:[]}],
[{list:'ordered'},{list:'bullet'}],
['link']
]
}
});

// bestehenden Inhalt laden
fetch("content.html")
.then(r => r.text())
.then(html=>{
quill.root.innerHTML = html;
});

// speichern (Download)
    async function saveToGitHub() {

            const repo = "USERNAME/REPO";
            const branch = "main";

            let token = localStorage.getItem("githubToken");

            if (!token) {
                token = prompt("GitHub Token eingeben");
                localStorage.setItem("githubToken", token);
            }

            const content = quill.root.innerHTML;

            const filename = "content-" + Date.now() + ".html";

            const encoded = btoa(unescape(encodeURIComponent(content)));


            // 1️⃣ neue content Datei
            await fetch(`https://api.github.com/repos/${repo}/contents/content/${filename}`, {

                method: "PUT",

                headers: {
                    "Authorization": "token " + token,
                    "Accept": "application/vnd.github+json"
                },

                body: JSON.stringify({

                    message: "New content version",
                    content: encoded,
                    branch: branch

                })

            });


            // 2️⃣ current.txt aktualisieren

            const currentFile = await fetch(
                `https://api.github.com/repos/${repo}/contents/current.txt`
            ).then(r => r.json());

            await fetch(`https://api.github.com/repos/${repo}/contents/current.txt`, {

                method: "PUT",

                headers: {
                    "Authorization": "token " + token,
                    "Accept": "application/vnd.github+json"
                },

                body: JSON.stringify({

                    message: "Update pointer",
                    content: btoa(filename),
                    sha: currentFile.sha,
                    branch: branch

                })

            });

            alert("Gespeichert!");

        }

    // BUTTON VERBINDEN
    document.getElementById("save").onclick = saveToGitHub;

</script>

</body>
</html>
