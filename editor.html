<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Editor</title>
    <link rel="apple-touch-icon" sizes="180x180" href="Bilder/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="Bilder/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Bilder/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="Bilder/favicon.ico">

    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            max-width: 800px;
            margin: auto;
        }

        #editor {
            min-height: 200px;       /* mindestens sichtbar */
            max-height: 80vh;        /* maximal Höhe */
            height: 300px;           /* Starthöhe */
            overflow-y: auto;        /* Scrollen erlauben */
            border: 1px solid #ccc;  /* optional, sichtbar */
            padding: 10px;
            resize: vertical;        /* live Skalierung erlauben */
        }

        button {
            margin-top: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>
    <h1>Seite bearbeiten</h1>

    <div id="editor"></div>

    <label for="versionSelect">Version laden:</label>
    <select id="versionSelect">
        <option>Lade Versionen…</option>
    </select>

    <button id="save">Save</button>

    <!-- Make sure these scripts are loaded before your snippet -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>
    <script type="module">
        // Import the modern image-drop-and-paste module from Skypack
        import QuillImageDropAndPaste from 'https://cdn.skypack.dev/quill-image-drop-and-paste';
        Quill.register('modules/imageDrop', QuillImageDropAndPaste);

        // 2️⃣ Initialize Quill
        const quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ header: [1, false] }],
                    ['bold', 'italic', 'underline'],
                    [{
                        color: [
                            getComputedStyle(document.documentElement).getPropertyValue('--Farbe1').trim(),
                            getComputedStyle(document.documentElement).getPropertyValue('--Farbe2').trim(),
                            getComputedStyle(document.documentElement).getPropertyValue('--Farbe3').trim(),
                            getComputedStyle(document.documentElement).getPropertyValue('--Farbe4').trim(),
                            getComputedStyle(document.documentElement).getPropertyValue('--Farbe5').trim(),
                            getComputedStyle(document.documentElement).getPropertyValue('--Farbe6').trim(),
                            getComputedStyle(document.documentElement).getPropertyValue('--Farbe7').trim()
                        ]
                    }],
                    [{ list: 'ordered' }, { list: 'bullet' }],
                    ['link', 'image'] // Image button active
                ],
                imageDrop: true,     // enables drag & paste
                imageResize: {}      // enables resize handles
            }
        });

        // bestehenden Inhalt laden
        async function loadContent() {

            const repo = "anam81/brigittebiodanza";

            const files = await fetch(
                `https://api.github.com/repos/${repo}/contents/content`
            ).then(r => r.json());

            let versions = [];

            files.forEach(file => {

                const match = file.name.match(/content-(\d+)\.html/);

                if (match) {

                    versions.push({
                        name: file.name,
                        time: parseInt(match[1])
                    });

                }

            });

            // neueste zuerst
            versions.sort((a, b) => b.time - a.time);

            // versuche Dateien der Reihe nach
            for (let v of versions) {

                const res = await fetch("content/" + v.name + "?v=" + Date.now());

                if (res.ok) {

                    const html = await res.text();

                    if (html.trim().startsWith("<!DOCTYPE")) {
                        continue;
                    }
                    quill.root.innerHTML = html;
                    return;

                }

            }

            // fallback
            quill.root.innerHTML = "<p>Noch kein Inhalt vorhanden.</p>";

        }

        loadContent();


        // Alte Versionen
        async function getVersions() {
            const repo = "anam81/brigittebiodanza";

            const files = await fetch(`https://api.github.com/repos/${repo}/contents/content`)
                .then(r => r.json());

            let versions = [];

            files.forEach(file => {
                const match = file.name.match(/content-(\d+)\.html/);
                if (match) {
                    versions.push({
                        name: file.name,
                        time: parseInt(match[1])
                    });
                }
            });

            // neueste zuerst
            versions.sort((a, b) => b.time - a.time);

            return versions;
        }
        async function populateVersionDropdown() {
            const select = document.getElementById("versionSelect");
            const versions = await getVersions();

            select.innerHTML = ""; // alte Optionen löschen

            versions.forEach(v => {
                const date = new Date(v.time).toLocaleString();
                const opt = document.createElement("option");
                opt.value = v.name;
                opt.textContent = date;
                select.appendChild(opt);
            });

            // optional: erste Version als ausgewählt setzen
            if (versions.length) select.value = versions[0].name;
        }

        populateVersionDropdown();

        document.getElementById("versionSelect").addEventListener("change", async (e) => {
            const filename = e.target.value;
            if (!filename) return;

            const res = await fetch("content/" + filename + "?v=" + Date.now());
            const html = await res.text();

            // GitHub Pages Fallback prüfen
            if (html.trim().startsWith("<!DOCTYPE")) {
                alert("Diese Version ist noch nicht verfügbar.");
                return;
            }

            quill.root.innerHTML = html;
        });


        // save
        async function saveToGitHub() {

            const repo = "anam81/brigittebiodanza";
            const branch = "main";

            let token = localStorage.getItem("githubToken");

            // Token abfragen, wenn fehlt
            if (!token) {
                token = prompt("GitHub Token eingeben");

                if (!token) {
                    alert("Speichern abgebrochen.");
                    return;
                }

                localStorage.setItem("githubToken", token);
            }

            const html = quill.root.innerHTML;
            const filename = "content-" + Date.now() + ".html";
            const encoded = btoa(unescape(encodeURIComponent(html)));

            const res = await fetch(
                `https://api.github.com/repos/${repo}/contents/content/${filename}`,
                {
                    method: "PUT",
                    headers: {
                        "Authorization": "token " + token,
                        "Accept": "application/vnd.github+json"
                    },
                    body: JSON.stringify({
                        message: "new content version",
                        content: encoded,
                        branch: branch
                    })
                }
            );

            if (!res.ok) {

                const error = await res.json();

                // Token löschen, wenn Authorization Fehler
                if (res.status === 401 || res.status === 403) {
                    localStorage.removeItem("githubToken");
                }

                alert("Fehler beim Speichern:\n" + (error.message || res.status));
                return;

            }

            alert("Gespeichert!");
        }

        document.getElementById("save").onclick = saveToGitHub;

    </script>

</body>

</html>
