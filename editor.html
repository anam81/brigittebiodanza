<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Editor</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>
body{
font-family:Arial;
max-width:800px;
margin:auto;
}

#editor{
height:300px;
}

button{
margin-top:10px;
padding:10px;
}
</style>
</head>

<body>

<h1>Seite bearbeiten</h1>

<div id="editor"></div>

<button id="save">Save</button>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>

const quill = new Quill('#editor',{
theme:'snow',
modules:{
toolbar:[
[{header:[1,2,3,false]}],
['bold','italic','underline'],
[{color:[]}],
[{list:'ordered'},{list:'bullet'}],
['link']
]
}
});

// bestehenden Inhalt laden
    async function loadContent() {

        const repo = "anam81/brigittebiodanza";

        const files = await fetch(
            `https://api.github.com/repos/${repo}/contents/content`
        ).then(r => r.json());

        let newest = null;
        let newestTime = 0;

        files.forEach(file => {

            const match = file.name.match(/content-(\d+)\.html/);

            if (match) {

                const time = parseInt(match[1]);

                if (time > newestTime) {
                    newestTime = time;
                    newest = file.name;
                }

            }

        });

        const html = await fetch("content/" + newest)
            .then(r => r.text());

        quill.root.innerHTML = html;

    }

    loadContent();


// save
    async function saveToGitHub() {

        const repo = "anam81/brigittebiodanza";
        const branch = "main";

        let token = localStorage.getItem("githubToken");

        if (!token) {
            token = prompt("GitHub Token eingeben");
            localStorage.setItem("githubToken", token);
        }

        const html = quill.root.innerHTML;

        const filename = "content-" + Date.now() + ".html";

        const encoded = btoa(unescape(encodeURIComponent(html)));

        await fetch(`https://api.github.com/repos/${repo}/contents/content/${filename}`, {

            method: "PUT",

            headers: {
                "Authorization": "token " + token,
                "Accept": "application/vnd.github+json"
            },

            body: JSON.stringify({

                message: "new content version",
                content: encoded,
                branch: branch

            })

        });

        alert("Gespeichert!");

    }

    document.getElementById("save").onclick = saveToGitHub;

</script>

</body>
</html>
