<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Editor</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>
body{
font-family:Arial;
max-width:800px;
margin:auto;
}

#editor{
height:300px;
}

button{
margin-top:10px;
padding:10px;
}
</style>
</head>

<body>

<h1>Seite bearbeiten</h1>

<div id="editor"></div>

<button id="save">Save</button>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>

const quill = new Quill('#editor',{
theme:'snow',
modules:{
toolbar:[
[{header:[1,2,3,false]}],
['bold','italic','underline'],
[{color:[]}],
[{list:'ordered'},{list:'bullet'}],
['link']
]
}
});

// bestehenden Inhalt laden
fetch("content.html")
.then(r => r.text())
.then(html=>{
quill.root.innerHTML = html;
});

// speichern (Download)
    async function saveToGitHub() {

        const repo = "USERNAME/REPOSITORY";
        const path = "content.html";
        const branch = "main";

        let token = localStorage.getItem("githubToken");

        if (!token) {
            token = prompt("GitHub Token eingeben");
            localStorage.setItem("githubToken", token);
        }

        const content = quill.root.innerHTML;

        // aktuelle Datei holen
        const file = await fetch(
            `https://api.github.com/repos/${repo}/contents/${path}?ref=${branch}`
        ).then(r => r.json());

        const sha = file.sha;

        // neue Version committen
        await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {

            method: "PUT",

            headers: {
                "Authorization": "token " + token,
                "Accept": "application/vnd.github+json"
            },

            body: JSON.stringify({
                message: "Update content",
                content: btoa(unescape(encodeURIComponent(content))),
                sha: sha,
                branch: branch
            })

        });

        alert("Gespeichert!");
    }

    // BUTTON VERBINDEN
    document.getElementById("save").onclick = saveToGitHub;

</script>

</body>
</html>
