<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodanza Brigitte Bremen</title>
    <link rel="apple-touch-icon" sizes="180x180" href="Bilder/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="Bilder/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Bilder/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="Bilder/favicon.ico">

    <!-- Google Font Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Externe CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero-bg bg1"></div>
    <div class="hero-bg bg2"></div>
    <script src="bg-slideshow.js"></script>

    <!-- Header / Menü -->
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="biodanza.html">Was ist Biodanza?</a></li>
                <li><a href="uebermich.html">Über mich</a></li>
                <li><a href="termine.html">Termine</a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content mit Hintergrundbild -->
    <main class="hero">

    <!-- Hauptbereich -->
    <div class="section">
        <img src="Bilder/logo-fuer-header-6.jpg" alt="Biodanza Brigitte Bremen Logo">
        <p class="unterLogo">Willkommen bei Biodanza</p>
        <div class="line"></div>
        <h1 class="title-large">Kontakt</h1>

        <form id="contact-form" class="kontakt-form">
            <label for="firstName">Vorname *</label>
            <input type="text" id="firstName" name="fi-sender-firstName" placeholder="Dein Vorname" required />
        
            <label for="lastName">Nachname *</label>
            <input type="text" id="lastName" name="fi-sender-lastName" placeholder="Dein Nachname" required />
        
            <label for="email">E-Mail *</label>
            <input type="email" id="email" name="fi-sender-email" placeholder="deine@email.de" required />
        
            <label for="message">Nachricht *</label>
            <textarea id="message" name="fi-text-message" placeholder="Deine Nachricht" required></textarea>
        
            <button type="submit">Nachricht senden</button>
        
            <p id="form-status"></p>
        </form>
        
        <!-- Forminit SDK -->
        <script src="https://forminit.com/sdk/v1/forminit.js"></script>
        <script>
            const forminit = new Forminit();
            const FORM_ID = 'czdu4o9u17x';

            const form = document.getElementById('contact-form');
            const status = document.getElementById('form-status');
            const submitButton = form.querySelector('button[type="submit"]');

            form.addEventListener('submit', async function (event) {
                event.preventDefault();

                status.textContent = 'Sending…';
                status.style.color = '#007bff'; // blau wie Loading
                submitButton.disabled = true;

                const formData = new FormData(form);
                const { error } = await forminit.submit(FORM_ID, formData);

                submitButton.disabled = false;

                if (error) {
                    status.textContent = error.message;
                    status.style.color = '#dc3545'; // rot für Fehler
                    return;
                }

                status.textContent = 'Nachricht erfolgreich gesendet';
                status.style.color = "var(--Farbe4)";
                status.style.fontWeight = "bold";
                form.reset();
            });
        </script>

        
    </div>

    <!-- Footer -->
    <footer>
        <a href="impressum.html">Impressum</a> |
        <a href="datenschutz.html">Datenschutzerklärung</a>
        <p>© <span id="year"></span> Brigitte Münch</p>
    </footer>

    <script>
        // aktuelles Jahr automatisch
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>

</body>
</html>
