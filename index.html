<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meine Webseite</title>

<style>
body{
font-family:Arial;
max-width:800px;
margin:auto;
}

header, footer{
background:#f0f0f0;
padding:20px;
}

#content{
padding:20px;
}
</style>
</head>

<body>

<header>
<h1>Meine Webseite</h1>
</header>

<div id="content"></div>

<footer>
© 2026
</footer>

<script>
fetch("content.html")
.then(r => r.text())
.then(html => {
document.getElementById("content").innerHTML = html;
});
</script>

</body>
</html>
