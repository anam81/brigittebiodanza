<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meine Webseite</title>

<style>
body{
font-family:Arial;
max-width:800px;
margin:auto;
}

header, footer{
background:#f0f0f0;
padding:20px;
}

#content{
padding:20px;
}
</style>
</head>

<body>

<header>
<h1>Meine Webseite</h1>
</header>

<div id="content"></div>

<footer>
© 2026
</footer>

<script>

    async function loadLatest() {

        const repo = "anam81/brigittebiodanza";

        const files = await fetch(
            `https://api.github.com/repos/${repo}/contents/content`
        ).then(r => r.json());

        let newest = null;
        let newestTime = 0;

        files.forEach(file => {

            const match = file.name.match(/content-(\d+)\.html/);

            if (match) {

                const time = parseInt(match[1]);

                if (time > newestTime) {
                    newestTime = time;
                    newest = file.name;
                }

            }

        });

        const html = await fetch("content/" + newest + "?v=" + Date.now())
            .then(r => r.text());

        document.getElementById("content").innerHTML = html;

    }

    loadLatest();

</script>

</body>
</html>
