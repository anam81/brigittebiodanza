<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Meine Webseite</title>

    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: auto;
        }

        header,
        footer {
            background: #f0f0f0;
            padding: 20px;
        }

        #content {
            padding: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Meine Webseite</h1>
    </header>

    <div id="content"></div>

    <footer>
        © 2026
    </footer>

<script>

    async function loadLatest() {

        const repo = "anam81/brigittebiodanza";

        const files = await fetch(
            `https://api.github.com/repos/${repo}/contents/content`
        ).then(r => r.json());

        let versions = [];

        files.forEach(file => {

            const match = file.name.match(/content-(\d+)\.html/);

            if (match) {

                versions.push({
                    name: file.name,
                    time: parseInt(match[1])
                });

            }

        });

        // neueste zuerst
        versions.sort((a, b) => b.time - a.time);


        // versuche Dateien der Reihe nach
        for (let v of versions) {

            const res = await fetch("content/" + v.name + "?v=" + Date.now());

            if (res.ok) {

                const html = await res.text();

                // GitHub Pages fallback erkennen
                if (html.trim().startsWith("<!DOCTYPE")) {
                    continue;
                }
                document.getElementById("content").innerHTML = html;
                return;

            }

        }

        // wenn gar nichts klappt
        document.getElementById("content").innerHTML =
            "Inhalt wird gerade aktualisiert.";

    }

    loadLatest();

</script>

</body>
</html>
