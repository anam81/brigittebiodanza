<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meine Webseite</title>

<style>
body{
font-family:Arial;
max-width:800px;
margin:auto;
}

header, footer{
background:#f0f0f0;
padding:20px;
}

#content{
padding:20px;
}
</style>
</head>

<body>

<header>
<h1>Meine Webseite</h1>
</header>

<div id="content"></div>

<footer>
© 2026
</footer>

<script>

    async function loadPage() {

        const pointer = await fetch("current.txt?v=" + Date.now()).then(r => r.text());

        const html = await fetch("content/" + pointer.trim() + "?v=" + Date.now())
            .then(r => r.text());

        document.getElementById("content").innerHTML = html;

    }

    loadPage();

</script>

</body>
</html>
