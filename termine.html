<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodanza Brigitte Bremen</title>

    <!-- Google Font Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Externe CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header / Menü -->
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="biodanza.html">Was ist Biodanza?</a></li>
                <li><a href="uebermich.html">Über mich</a></li>
                <li><a href="termine.html">Termine</a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content mit Hintergrundbild -->
    <main class="hero" style="background-image: url('Bilder/green_dust_scratch.png');">

        <!-- Hauptbereich -->
        <div class="section">
            <img src="Bilder/logo-fuer-header-6.jpg" alt="Biodanza Brigitte Bremen Logo">
            <p class="unterLogo">Willkommen bei Biodanza</p>
            <div class="line"></div>

            <h1 class="title-large">Termine</h1>
            
            <div id="content"
                style="text-align:left; max-width:100%; margin:0 auto; box-sizing:border-box; word-break:break-word; overflow-x:auto;">
            </div>
            
            <style>
                /* Quill-Ausgabe */
                #content h1 {
                    font-size: 1.7rem;
                    font-weight: 600;
                    text-align: center;
                    /* Überschriften mittig */
                }
            
                #content h2 {
                    font-size: 1.3rem;
                    font-weight: 500;
                    text-align: center;
                    /* Unterüberschriften mittig */
                }
            
                #content p {
                    margin: 0 0 1rem 0;
                    /* vertikaler Abstand zwischen Absätzen */
                }
            
                /* Bilder responsive und mittig */
                #content img {
                    max-width: 100%;
                    height: auto;
                    display: block;
                    margin: 0 auto;
                }
            
                /* Tabellen responsive und mittig */
                #content table {
                    max-width: 100%;
                    width: 100%;
                    border-collapse: collapse;
                    margin: 1rem auto;
                }
            
                #content th,
                #content td {
                    border: 1px solid #ccc;
                    padding: 0.5rem;
                    text-align: center;
                }
            
                /* Lange Wörter umbrechen */
                #content {
                    word-break: break-word;
                }
            </style>
        </div>

        <!-- Footer -->
        <footer>
            <a href="impressum.html">Impressum</a> |
            <a href="datenschutz.html">Datenschutzerklärung</a>
            <p>© <span id="year"></span> Brigitte Münch</p>
        </footer>

        <script>
            // aktuelles Jahr automatisch
            document.getElementById('year').textContent = new Date().getFullYear();

            async function loadLatest() {

                const repo = "anam81/brigittebiodanza";

                const files = await fetch(
                    `https://api.github.com/repos/${repo}/contents/content`
                ).then(r => r.json());

                let versions = [];

                files.forEach(file => {

                    const match = file.name.match(/content-(\d+)\.html/);

                    if (match) {

                        versions.push({
                            name: file.name,
                            time: parseInt(match[1])
                        });

                    }

                });

                // neueste zuerst
                versions.sort((a, b) => b.time - a.time);


                // versuche Dateien der Reihe nach
                for (let v of versions) {

                    const res = await fetch("content/" + v.name + "?v=" + Date.now());

                    if (res.ok) {

                        const html = await res.text();

                        // GitHub Pages fallback erkennen
                        if (html.trim().startsWith("<!DOCTYPE")) {
                            continue;
                        }
                        document.getElementById("content").innerHTML = html;
                        return;

                    }

                }

                // wenn gar nichts klappt
                document.getElementById("content").innerHTML =
                    "Inhalt wird gerade aktualisiert.";

            }

            loadLatest();

        </script>
</body>

</html>
