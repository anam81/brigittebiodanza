backend:
  name: github
  repo: anam81/brigittebiodanza
  branch: main

media_folder: "assets"      # Lokaler Ordner für Bilder
public_folder: "/assets"    # URL-Pfad für Bilder

collections:
  - name: "pages"
    label: "Seiten"
    files:
      - file: "index.html"
        label: "Startseite"
        name: "home"
        fields:
          - {label: "Titel", name: "title", widget: "string"}
          - {label: "Untertitel", name: "subtitle", widget: "string"}
